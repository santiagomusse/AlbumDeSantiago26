<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Mi Álbum WC 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --c-red: #C8102E;
    --c-yellow: #FFD100;
    --c-teal: #00B2A9;
    --c-blue: #0057B7;
    --c-orange: #FF6A13;
    --c-pink: #E5007D;
    --c-purple: #6B2C91;
    --c-green: #00A651;
    --bg-dark: #0f0f1e;
    --bg-card: #1a1a2e;
    --bg-elevated: #252540;
    --text: #ffffff;
    --text-mute: #9999b3;
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Pattern background del We Are 26 (manchas de color) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 5%, var(--c-red) 0, transparent 60px),
      radial-gradient(circle at 90% 8%, var(--c-yellow) 0, transparent 60px),
      radial-gradient(circle at 25% 95%, var(--c-teal) 0, transparent 80px),
      radial-gradient(circle at 80% 92%, var(--c-blue) 0, transparent 70px),
      radial-gradient(circle at 50% 50%, var(--c-orange) 0, transparent 50px);
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  .face-pattern.left { left: 0; }
  .face-pattern.right { right: 0; transform: scaleX(-1); }

  /* Cuando el contenido es muy ancho (pantalla pequeña), reducir el patrón */
  @media (max-width: 1280px) {
    .face-pattern { width: 140px; background-size: 80px auto; opacity: 0.24; }
  }
  @media (max-width: 900px) {
    .face-pattern { display: none; }
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

  /* HEADER */
  .hero {
    position: relative;
    padding: 24px 20px 28px;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .hero-pattern {
    position: absolute; inset: 0;
    background:
      conic-gradient(from 45deg at 20% 30%, var(--c-red) 0deg, var(--c-red) 90deg, transparent 90deg),
      conic-gradient(from 180deg at 80% 20%, var(--c-yellow) 0deg, var(--c-yellow) 90deg, transparent 90deg),
      conic-gradient(from 270deg at 90% 70%, var(--c-teal) 0deg, var(--c-teal) 90deg, transparent 90deg),
      conic-gradient(from 0deg at 15% 85%, var(--c-blue) 0deg, var(--c-blue) 90deg, transparent 90deg),
      conic-gradient(from 90deg at 60% 60%, var(--c-orange) 0deg, var(--c-orange) 90deg, transparent 90deg);
    opacity: 0.15;
    filter: blur(40px);
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--c-yellow);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hero-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 0.95;
    letter-spacing: -1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .hero-title span:nth-child(1) { color: var(--c-red); }
  .hero-title span:nth-child(2) { color: var(--c-yellow); }
  .hero-title span:nth-child(3) { color: var(--c-teal); }
  .hero-sub { font-size: 13px; color: var(--text-mute); margin-top: 8px; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 12px 8px;
    border-radius: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat.total::before { background: var(--c-blue); }
  .stat.tengo::before { background: var(--c-teal); }
  .stat.falta::before { background: var(--c-red); }
  .stat.repe::before { background: var(--c-yellow); }
  .stat-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
  .stat-value { font-family: 'Archivo Black', sans-serif; font-size: 22px; line-height: 1; }
  .stat.tengo .stat-value { color: var(--c-teal); }
  .stat.falta .stat-value { color: var(--c-red); }
  .stat.repe .stat-value { color: var(--c-yellow); }

  /* PROGRESS */
  .progress-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 14px;
  }
  .progress-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 12px;
  }
  .progress-pct { font-family: 'Archivo Black', sans-serif; font-size: 18px; }
  .progress-bar {
    height: 8px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--c-red), var(--c-orange), var(--c-yellow), var(--c-teal), var(--c-blue));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* CONTROLS */
  .controls {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .search {
    flex: 1; min-width: 180px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border 0.2s;
  }
  .search:focus { border-color: var(--c-yellow); }
  .search::placeholder { color: var(--text-mute); }

  /* TABS GRANDES */

<script>
// ============================================================
// DATOS DEL ÁLBUM (extraídos del PDF Album_PDF_2026)
// ============================================================
const TEAM_NAMES = {
  MEX: { name: 'México' }, RSA: { name: 'Sudáfrica' }, KOR: { name: 'Corea Rep.' }, CZE: { name: 'Chequia' },
  CAN: { name: 'Canadá' }, BIH: { name: 'Bosnia-Herz.' }, QAT: { name: 'Qatar' }, SUI: { name: 'Suiza' },
  BRA: { name: 'Brasil' }, MAR: { name: 'Marruecos' }, HAI: { name: 'Haití' }, SCO: { name: 'Escocia' },
  USA: { name: 'USA' }, PAR: { name: 'Paraguay' }, AUS: { name: 'Australia' }, TUR: { name: 'Türkiye' },
  GER: { name: 'Alemania' }, CUW: { name: 'Curazao' }, CIV: { name: 'Costa de Marfil' }, ECU: { name: 'Ecuador' },
  NED: { name: 'Países Bajos' }, JPN: { name: 'Japón' }, SWE: { name: 'Suecia' }, TUN: { name: 'Túnez' },
  BEL: { name: 'Bélgica' }, EGY: { name: 'Egipto' }, IRN: { name: 'Irán' }, NZL: { name: 'Nueva Zelanda' },
  ESP: { name: 'España' }, CPV: { name: 'Cabo Verde' }, KSA: { name: 'Arabia Saudí' }, URU: { name: 'Uruguay' },
  FRA: { name: 'Francia' }, SEN: { name: 'Senegal' }, IRQ: { name: 'Irak' }, NOR: { name: 'Noruega' },
  ARG: { name: 'Argentina' }, ALG: { name: 'Argelia' }, AUT: { name: 'Austria' }, JOR: { name: 'Jordania' },
  POR: { name: 'Portugal' }, COD: { name: 'RD del Congo' }, UZB: { name: 'Uzbekistán' }, COL: { name: 'Colombia' },
  ENG: { name: 'Inglaterra' }, CRO: { name: 'Croacia' }, GHA: { name: 'Ghana' }, PAN: { name: 'Panamá' }
};

const GROUPS = [
  { letter: 'A', color: '#00B2A9', teams: ['MEX','RSA','KOR','CZE'] },
  { letter: 'B', color: '#C8102E', teams: ['CAN','BIH','QAT','SUI'] },
  { letter: 'C', color: '#FFD100', teams: ['BRA','MAR','HAI','SCO'] },
  { letter: 'D', color: '#0057B7', teams: ['USA','PAR','AUS','TUR'] },
  { letter: 'E', color: '#FF6A13', teams: ['GER','CUW','CIV','ECU'] },
  { letter: 'F', color: '#00A651', teams: ['NED','JPN','SWE','TUN'] },
  { letter: 'G', color: '#9DB4D6', teams: ['BEL','EGY','IRN','NZL'] },
  { letter: 'H', color: '#3FBFB0', teams: ['ESP','CPV','KSA','URU'] },
  { letter: 'I', color: '#6B2C91', teams: ['FRA','SEN','IRQ','NOR'] },
  { letter: 'J', color: '#F5B6C5', teams: ['ARG','ALG','AUT','JOR'] },
  { letter: 'K', color: '#E5007D', teams: ['POR','COD','UZB','COL'] },
  { letter: 'L', color: '#7B1F26', teams: ['ENG','CRO','GHA','PAN'] }
];

// Construir secciones
const SECTIONS = [];

// 1. Intro / FWC
SECTIONS.push({
  id: 'intro',
  name: 'Intro · We Are Panini',
  flag: 'FWC',
  color: '#FFD100',
  cromos: [
    {code: '00'},
    {code: 'FWC1'}, {code: 'FWC2'}, {code: 'FWC3'}, {code: 'FWC4'},
    {code: 'FWC5'}, {code: 'FWC6'}, {code: 'FWC7'}, {code: 'FWC8'}
  ]
});

// 2. Equipos por grupo
GROUPS.forEach(g => {
  g.teams.forEach(code => {
    const team = TEAM_NAMES[code];
    const cromos = [];
    for (let i = 1; i <= 20; i++) {
      cromos.push({code: `${code}${i}`, num: i});
    }
    SECTIONS.push({
      id: code.toLowerCase(),
      name: `${team.name}`,
      group: g.letter,
      flag: code,
      color: g.color,
      cromos
    });
  });
});

// 3. FWC9-19 (intro extras / posters)
SECTIONS.push({
  id: 'fwc-extras',
  name: 'FWC · Extras',
  flag: 'FWC',
  color: '#E5007D',
  cromos: Array.from({length: 11}, (_, i) => ({ code: `FWC${i+9}` }))
});

// 4. Coca-Cola CC1-14
SECTIONS.push({
  id: 'coca',
  name: 'Coca-Cola · Momentos',
  flag: 'CC',
  color: '#C8102E',
  cromos: Array.from({length: 14}, (_, i) => ({ code: `CC${i+1}` }))
});

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'wc26-album-v4';
let state = {};
let viewMode = false; // true = read-only mode (viewing someone else's album)
let myStateBackup = null; // backup of own state when in view mode

// Compact encoding: estado → string corto para meter en URL
// Formato: cada cromo se codifica como "code:state[count]" separado por |
// "tengo" = T, "repe" = R seguido del count (ej: ARG5:T, ARG6:R3)
function encodeState(s) {
  const parts = [];
  for (const code in s) {
    if (code.startsWith('_c_')) continue; // skip collapsed sections
    const v = s[code];
    if (v.status === 'tengo') parts.push(code);
    else if (v.status === 'repe') parts.push(code + 'r' + v.count);
  }
  return parts.join('.');
}
function decodeState(str) {
  const result = {};
  if (!str) return result;
  str.split('.').forEach(part => {
    if (!part) return;
    const ri = part.indexOf('r');
    if (ri > -1) {
      const code = part.substring(0, ri);
      const count = parseInt(part.substring(ri + 1)) || 2;
      result[code] = { status: 'repe', count };
    } else {
      result[part] = { status: 'tengo', count: 1 };
    }
  });
  return result;
}

// Detectar si hay URL compartida
// ============================================================
// ÁLBUM PUBLICADO (lo que ven los amigos)
// Para actualizarlo: usa el botón "Publicar" y pega el código aquí abajo
// ============================================================
const PUBLISHED_ALBUM = ""; // ← pegar aquí el código publicado

// ============================================================
// MODO DE EJECUCIÓN
// - #admin → modo edición (solo tú)
// - #share=... → modo visión con un álbum específico (snapshot temporal)
// - sin nada → modo visión con el álbum publicado (lo que ven los amigos)
// ============================================================
const urlHash = window.location.hash;
const isAdmin = urlHash === '#admin';

if (urlHash.startsWith('#share=')) {
  // Snapshot compartido por link (modo visión)
  try {
    const shared = decodeState(decodeURIComponent(urlHash.substring(7)));
    state = shared;
    viewMode = true;
  } catch(e) {
    console.error('Error al decodificar álbum compartido', e);
  }
} else if (isAdmin) {
  // Modo edición: cargar desde localStorage
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) { state = {}; }
} else {
  // Default: modo visión con el álbum publicado
  if (PUBLISHED_ALBUM) {
    try {
      state = decodeState(PUBLISHED_ALBUM);
      viewMode = true;
    } catch(e) {
      console.error('Error al cargar álbum publicado', e);
    }
  } else {
    // No hay álbum publicado todavía → mostrar mensaje
    viewMode = true;
  }
}

function saveState() {
  if (viewMode) return; // no guardar cambios en modo visión
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getStatus(code) { return state[code] || { status: 'falta', count: 0 }; }

// Tab activo: 'falta' | 'tengo' | 'repe'
let currentTab = 'falta';

// Acción en tab "Faltan": tap marca como tengo
function markAsTengo(code) {
  if (viewMode) { toast('Estás en modo visión'); return; }
  state[code] = { status: 'tengo', count: 1 };
  saveState();
  render();
}

// Acción en tab "Tengo": tap quita (vuelve a falta)
function markAsFalta(code) {
  if (viewMode) { toast('Estás en modo visión'); return; }
  delete state[code];
  saveState();
  render();
}

// Acciones en tab "Repetidas": agregar / quitar
function addRepe(code) {
  if (viewMode) { toast('Estás en modo visión'); return; }
  const cur = getStatus(code);
  if (cur.status === 'falta') {
    // No tiene la base aún → conviértela en "tengo" primero, requiere otra repe para empezar
    state[code] = { status: 'repe', count: 2 };
  } else if (cur.status === 'tengo') {
    state[code] = { status: 'repe', count: 2 };
  } else {
    state[code] = { status: 'repe', count: cur.count + 1 };
  }
  saveState();
  render();
}

function removeRepe(code) {
  if (viewMode) { toast('Estás en modo visión'); return; }
  const cur = getStatus(code);
  if (cur.status !== 'repe') return;
  if (cur.count > 2) {
    state[code] = { status: 'repe', count: cur.count - 1 };
  } else {
    // count === 2 → al quitar uno queda solo el "tengo"
    state[code] = { status: 'tengo', count: 1 };
  }
  saveState();
  render();
}

// Convertir un cromo "tengo" en su primera repetida (desde el tab Tengo)
function promoteToRepe(code) {
  if (viewMode) { toast('Estás en modo visión'); return; }
  state[code] = { status: 'repe', count: 2 };
  saveState();
  render();
}

let searchQuery = '';

function matchesTab(code) {
  const s = getStatus(code);
  if (currentTab === 'falta') return s.status === 'falta';
  if (currentTab === 'tengo') return s.status === 'tengo' || s.status === 'repe';
  if (currentTab === 'repe') return s.status === 'repe';
  return true;
}

function matchesSearch(cromo, sec) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return cromo.code.toLowerCase().includes(q)
      || sec.name.toLowerCase().includes(q);
}

const HINTS = {
  falta: '👆 Tap en un cromo para marcarlo como "tengo"',
  tengo: '👆 Click para desmarcar · Click derecho (o tap largo en móvil) para pasar a repetidas',
  repe: '👆 Usa los botones + y − para sumar o quitar repetidas'
};

function render() {
  // Stats
  let total = 0, tengo = 0, falta = 0, repe = 0;
  SECTIONS.forEach(sec => sec.cromos.forEach(c => {
    total++;
    const s = getStatus(c.code);
    if (s.status === 'tengo') tengo++;
    else if (s.status === 'repe') { tengo++; repe += (s.count - 1); }
    else falta++;
  }));

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-tengo').textContent = tengo;
  document.getElementById('stat-falta').textContent = falta;
  document.getElementById('stat-repe').textContent = repe;
  document.getElementById('tab-count-falta').textContent = falta;
  document.getElementById('tab-count-tengo').textContent = tengo;
  document.getElementById('tab-count-repe').textContent = repe;
  const pct = total ? Math.round((tengo / total) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // Hint según tab
  const hintEl = document.getElementById('hint-text');
  if (hintEl) hintEl.textContent = HINTS[currentTab];

  // Activar tab visualmente
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });

  // Sections
  const container = document.getElementById('sections');
  let html = '';
  let lastGroup = null;

  SECTIONS.forEach(sec => {
    const filtered = sec.cromos.filter(c => matchesTab(c.code) && matchesSearch(c, sec));
    if (filtered.length === 0) return;

    // Group divider
    if (sec.group && sec.group !== lastGroup) {
      html += `<div class="group-divider">Grupo ${sec.group}</div>`;
      lastGroup = sec.group;
    } else if (!sec.group) {
      lastGroup = null;
    }

    const secTengo = sec.cromos.filter(c => {
      const s = getStatus(c.code);
      return s.status === 'tengo' || s.status === 'repe';
    }).length;
    const isComplete = secTengo === sec.cromos.length;
    const collapsed = state['_c_' + sec.id] ? 'collapsed' : '';

    html += `
      <div class="section ${collapsed}" style="--accent: ${sec.color}" data-id="${sec.id}">
        <div class="section-head" onclick="toggleSection('${sec.id}')">
          <div class="section-title-wrap">
            <div class="section-flag" style="background: ${sec.color}">${sec.flag}</div>
            <div class="section-title">${sec.name}</div>
          </div>
          <div class="section-meta">
            <div class="section-badge ${isComplete ? 'complete' : ''}">${secTengo}/${sec.cromos.length}</div>
            <div class="chev"></div>
          </div>
        </div>
        <div class="cromos">
          ${filtered.map(c => {
            const s = getStatus(c.code);
            // Estilo del cromo según tab
            if (currentTab === 'repe' && s.status === 'repe') {
              // En tab repe, mostrar controles +/−
              return `
                <div class="cromo repe" data-code="${c.code}">
                  <div class="repe-controls">
                    <div class="rc-top">
                      <div class="rc-num">${c.code}</div>
                      <div class="rc-count">×${s.count}</div>
                    </div>
                    <div class="rc-buttons">
                      <button class="rc-btn" onclick="event.stopPropagation();removeRepe('${c.code}')">−</button>
                      <button class="rc-btn" onclick="event.stopPropagation();addRepe('${c.code}')">+</button>
                    </div>
                  </div>
                </div>`;
            }
            const cls = s.status === 'tengo' ? 'tengo' : s.status === 'repe' ? 'repe' : '';
            const badge = s.status === 'repe' ? `<div class="repe-badge">×${s.count}</div>` : '';
            return `<div class="cromo ${cls}" data-code="${c.code}">${badge}<div class="num">${c.code}</div></div>`;
          }).join('')}
        </div>
      </div>
    `;
  });

  if (!html) {
    const emptyMsg = currentTab === 'falta' ? '🎉 ¡No te falta ninguna!' :
                     currentTab === 'tengo' ? 'Aún no tienes cromos marcados' :
                     'No tienes repetidas';
    html = `<div class="empty">${emptyMsg}</div>`;
  }
  container.innerHTML = html;

  // Bind events según tab actual
  container.querySelectorAll('.cromo').forEach(el => {
    const code = el.dataset.code;

    if (currentTab === 'falta') {
      // Tap simple → marcar como tengo
      el.addEventListener('click', () => markAsTengo(code));
    } else if (currentTab === 'tengo') {
      // Click izquierdo (o tap) → vuelve a falta
      // Click derecho (desktop) o tap largo (móvil) → promover a repe
      el.addEventListener('click', (e) => {
        e.preventDefault();
        markAsFalta(code);
      });
      el.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        promoteToRepe(code);
      });
      // Tap largo solo para móvil (donde no hay click derecho)
      let pressTimer = null;
      let longPressed = false;
      const isTouchEvent = () => 'ontouchstart' in window;
      el.addEventListener('touchstart', () => {
        longPressed = false;
        pressTimer = setTimeout(() => {
          longPressed = true;
          promoteToRepe(code);
          if (navigator.vibrate) navigator.vibrate(30);
        }, 500);
      }, { passive: true });
      el.addEventListener('touchend', (e) => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        if (longPressed) e.preventDefault(); // bloquear el click si ya hicimos long press
      });
      el.addEventListener('touchcancel', () => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      });
    }
    // tab 'repe' usa los botones inline +/-, no necesita binding aquí
  });
}

window.toggleSection = function(id) {
  state['_c_' + id] = !state['_c_' + id];
  saveState();
  render();
};

window.resetAll = function() {
  if (confirm('¿Reiniciar todo el álbum? Esto borrará todo tu progreso.')) {
    state = {};
    saveState();
    render();
    toast('Álbum reiniciado');
  }
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

window.exportList = function(type) {
  const lines = [];
  if (type === 'repes') lines.push('🟡 MIS REPETIDAS — WC 2026\n');
  else lines.push('❌ ME FALTAN — WC 2026\n');

  SECTIONS.forEach(sec => {
    const items = [];
    sec.cromos.forEach(c => {
      const s = getStatus(c.code);
      if (type === 'repes' && s.status === 'repe') {
        items.push(`${c.code}${s.count > 2 ? ' ×'+(s.count-1) : ''}`);
      }
      if (type === 'falta' && s.status === 'falta') {
        items.push(c.code);
      }
    });
    if (items.length) lines.push(`${sec.name}: ${items.join(', ')}`);
  });

  if (lines.length === 1) lines.push(type === 'repes' ? '(Sin repetidas aún)' : '(¡Tienes todas!)');

  showModal(type === 'repes' ? 'Lista de repes' : 'Lista de faltantes', lines.join('\n'));
};

window.exportData = function() {
  const data = JSON.stringify(state);
  showModal('Backup de tu álbum', data);
};

window.importData = function() {
  const input = prompt('Pega aquí tu backup (formato JSON):');
  if (!input) return;
  try {
    const parsed = JSON.parse(input);
    if (typeof parsed !== 'object') throw new Error('formato inválido');
    if (confirm('¿Reemplazar tu progreso actual con este backup?')) {
      state = parsed;
      saveState();
      render();
      toast('Backup restaurado');
    }
  } catch (e) {
    alert('Error al leer el backup. Asegúrate de copiar el texto completo.');
  }
};

let modalText = '';
function showModal(title, content) {
  modalText = content;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-content').textContent = content;
  document.getElementById('modal').classList.add('show');
}
window.closeModal = function() { document.getElementById('modal').classList.remove('show'); };
window.copyModal = function() {
  navigator.clipboard.writeText(modalText).then(() => {
    toast('¡Copiado al portapapeles!');
    setTimeout(() => closeModal(), 500);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = modalText;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('¡Copiado!'); } catch(e) { alert('Selecciona y copia manualmente'); }
    document.body.removeChild(ta);
    closeModal();
  });
};

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    render();
  });
});

// ============================================================
// COMPARTIR / MODO VISIÓN
// ============================================================
window.shareAlbum = function() {
  const encoded = encodeState(state);
  const baseUrl = window.location.href.split('#')[0];
  const shareUrl = baseUrl + '#share=' + encodeURIComponent(encoded);

  // Stats rápidas para incluir en el mensaje
  let tengo = 0, repe = 0, total = 0;
  SECTIONS.forEach(sec => sec.cromos.forEach(c => {
    total++;
    const s = getStatus(c.code);
    if (s.status === 'tengo' || s.status === 'repe') tengo++;
    if (s.status === 'repe') repe += (s.count - 1);
  }));
  const pct = Math.round((tengo / total) * 100);

  const msg = `🏆 Mi álbum WC 2026\n` +
              `✅ Tengo: ${tengo}/${total} (${pct}%)\n` +
              `🟡 Repes para cambiar: ${repe}\n\n` +
              `Mira mi progreso (modo visión):\n${shareUrl}`;

  showModal('🔗 Compartir álbum', msg);
};

window.publishAlbum = function() {
  const encoded = encodeState(state);

  let tengo = 0, total = 0;
  SECTIONS.forEach(sec => sec.cromos.forEach(c => {
    total++;
    const s = getStatus(c.code);
    if (s.status === 'tengo' || s.status === 'repe') tengo++;
  }));

  const instructions =
    `📋 INSTRUCCIONES PARA PUBLICAR:\n\n` +
    `1. Copia el código de abajo (botón Copiar).\n` +
    `2. Ve a tu repositorio en GitHub.\n` +
    `3. Abre el archivo index.html → ícono lápiz "Edit".\n` +
    `4. Busca (Ctrl+F): PUBLISHED_ALBUM = ""\n` +
    `5. Pega tu código DENTRO de las comillas:\n` +
    `   const PUBLISHED_ALBUM = "AQUI_PEGAS";\n` +
    `6. Abajo dale "Commit changes".\n` +
    `7. Espera 1-2 min y refresca tu URL pública.\n\n` +
    `Estado actual: ${tengo}/${total} cromos\n\n` +
    `═══ CÓDIGO A COPIAR ═══\n${encoded}`;

  showModal('📢 Publicar álbum', instructions);
};

window.exitViewMode = function() {
  // Quitar el hash y recargar
  window.location.hash = '';
  window.location.reload();
};

// Aplicar UI de modo visión si está activo
if (viewMode) {
  // Distinguir si es álbum publicado o un share por link
  const isSnapshot = urlHash.startsWith('#share=');
  const bannerEl = document.getElementById('banner-text');
  if (isSnapshot) {
    document.getElementById('hero-eyebrow').textContent = '👀 MODO VISIÓN · Snapshot compartido';
    document.getElementById('hero-sub').textContent = 'Estás viendo una versión específica del álbum';
    if (bannerEl) bannerEl.textContent = '👀 Modo visión · Versión snapshot, solo lectura';
  } else if (PUBLISHED_ALBUM) {
    document.getElementById('hero-eyebrow').textContent = '👀 ÁLBUM DE SANTIAGO · Solo lectura';
    document.getElementById('hero-sub').textContent = 'Mira lo que tengo, me falta y mis repetidas';
    if (bannerEl) bannerEl.textContent = '👀 Solo lectura · Navega las pestañas y usa el buscador';
  } else {
    document.getElementById('hero-eyebrow').textContent = '⏳ ÁLBUM AÚN NO PUBLICADO';
    document.getElementById('hero-sub').textContent = 'Santiago aún no ha publicado su progreso';
    if (bannerEl) bannerEl.textContent = '⏳ El dueño aún no ha publicado su álbum';
  }
  document.getElementById('view-mode-banner').style.display = 'block';
  document.getElementById('owner-actions').style.display = 'none';
}

render();
</script>
